services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/stocks.db"
      Finnhub__ApiKey: "${FINNHUB_API_KEY:-}"
    volumes:
      - stock-data:/app/data

volumes:
  stock-data:
